<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIGIL – Urban Waste Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #060c14;
            --bg2: #0a1525;
            --bg3: #0d1e35;
            --panel: #0f2040;
            --panel2: #132a50;
            --border: #1a3a6a;
            --border2: #1f4880;
            --cyan: #00d4ff;
            --cyan2: #00a8cc;
            --green: #00ff88;
            --green2: #00cc6a;
            --yellow: #ffd700;
            --orange: #ff8c00;
            --red: #ff3d5a;
            --red2: #cc1a33;
            --purple: #a855f7;
            --text: #c8ddf5;
            --text2: #8ab0d8;
            --text3: #4a7aaa;
            --glow-c: 0 0 20px rgba(0, 212, 255, 0.4);
            --glow-g: 0 0 20px rgba(0, 255, 136, 0.4);
            --glow-r: 0 0 20px rgba(255, 61, 90, 0.4);
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
            --font-main: 'Exo 2', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        @keyframes scan {
            0% {
                top: 0%
            }

            100% {
                top: 100%
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-4px)
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(0, 212, 255, 0.2)
            }

            50% {
                box-shadow: 0 0 30px rgba(0, 212, 255, 0.6)
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes gridScroll {
            0% {
                background-position: 0 0
            }

            100% {
                background-position: 40px 40px
            }
        }

        .panel {
            background: linear-gradient(135deg, var(--panel) 0%, var(--bg2) 100%);
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.03) 0%, transparent 30%);
        }

        .panel-corner {
            position: absolute;
            width: 10px;
            height: 10px;
            border-color: var(--cyan);
            border-style: solid;
        }

        .panel-corner.tl {
            top: 0;
            left: 0;
            border-width: 2px 0 0 2px;
        }

        .panel-corner.tr {
            top: 0;
            right: 0;
            border-width: 2px 2px 0 0;
        }

        .panel-corner.bl {
            bottom: 0;
            left: 0;
            border-width: 0 0 2px 2px;
        }

        .panel-corner.br {
            bottom: 0;
            right: 0;
            border-width: 0 2px 2px 0;
        }

        .panel-title {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan);
            padding: 10px 14px 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pulse 2s infinite;
        }

        .stat-num {
            font-family: var(--font-mono);
            font-size: 28px;
            line-height: 1;
            color: var(--cyan);
        }

        .stat-label {
            font-family: var(--font-ui);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
            margin-top: 3px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 2px;
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge-red {
            background: rgba(255, 61, 90, 0.15);
            color: var(--red);
            border: 1px solid rgba(255, 61, 90, 0.3);
        }

        .badge-yellow {
            background: rgba(255, 215, 0, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .badge-green {
            background: rgba(0, 255, 136, 0.15);
            color: var(--green);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .badge-cyan {
            background: rgba(0, 212, 255, 0.15);
            color: var(--cyan);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .badge-orange {
            background: rgba(255, 140, 0, 0.15);
            color: var(--orange);
            border: 1px solid rgba(255, 140, 0, 0.3);
        }

        .badge-purple {
            background: rgba(168, 85, 247, 0.15);
            color: var(--purple);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .bar-track {
            background: var(--bg);
            border-radius: 2px;
            height: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s ease;
        }

        .live-feed-wrap {
            position: relative;
            background: #000;
            border-radius: 2px;
            overflow: hidden;
        }

        .scanline {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        .feed-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.05;
            background-image: repeating-linear-gradient(0deg, #fff 0, #fff 1px, transparent 1px, transparent 40px),
                repeating-linear-gradient(90deg, #fff 0, #fff 1px, transparent 1px, transparent 40px);
        }

        .map-container {
            position: relative;
            background: var(--bg);
            border-radius: 2px;
            overflow: hidden;
        }

        .btn {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 8px 16px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--cyan);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: var(--glow-c);
        }

        .btn-danger {
            color: var(--red);
            border-color: rgba(255, 61, 90, 0.4);
        }

        .btn-danger:hover {
            background: rgba(255, 61, 90, 0.1);
            box-shadow: var(--glow-r);
        }

        .btn-green {
            color: var(--green);
            border-color: rgba(0, 255, 136, 0.4);
        }

        .btn-green:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: var(--glow-g);
        }

        .input-field {
            background: var(--bg);
            border: 1px solid var(--border2);
            color: var(--text);
            font-family: var(--font-main);
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 2px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.2);
        }

        .input-field::placeholder {
            color: var(--text3);
        }

        .tab {
            font-family: var(--font-ui);
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 14px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text3);
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .tab:hover:not(.active) {
            color: var(--text);
        }

        .alert-item {
            animation: slideIn 0.3s ease;
        }

        .row-hover:hover {
            background: rgba(0, 212, 255, 0.04);
        }

        .radar-ping {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--red);
            animation: radar-expand 2s ease-out infinite;
        }

        @keyframes radar-expand {
            0% {
                transform: scale(0.1);
                opacity: 1;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .heatmap-dot {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 3s infinite;
        }

        /* ── Leaflet map dark theme overrides ── */
        .leaflet-container {
            background: #060c14 !important;
            font-family: var(--font-main);
        }

        .leaflet-tile {
            filter: brightness(0.4) saturate(0.6) hue-rotate(180deg);
        }

        .leaflet-control-zoom a {
            background: var(--panel) !important;
            color: var(--cyan) !important;
            border-color: var(--border) !important;
        }

        .leaflet-popup-content-wrapper {
            background: var(--panel) !important;
            border: 1px solid var(--border2) !important;
            border-radius: 4px !important;
            color: var(--text) !important;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2) !important;
        }

        .leaflet-popup-tip {
            background: var(--panel) !important;
        }

        .leaflet-popup-content {
            margin: 10px 14px !important;
            font-family: var(--font-main);
            font-size: 12px;
        }

        .leaflet-bar {
            border: 1px solid var(--border) !important;
            background: var(--panel) !important;
        }

        .vigil-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid;
            animation: pulse 3s infinite;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        /* ── LIVE CAM ── */
        @keyframes cornerPing {
            0% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.4;
                transform: scale(1.3)
            }

            100% {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes detectionFlash {
            0% {
                opacity: 0
            }

            10% {
                opacity: 1
            }

            90% {
                opacity: 1
            }

            100% {
                opacity: 0
            }
        }

        @keyframes scanH {
            0% {
                top: 0%
            }

            100% {
                top: 100%
            }
        }

        .cam-wrap {
            position: relative;
            background: #000;
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16/9;
            border: 1px solid var(--border2);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
        }

        .cam-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .cam-wrap canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .cam-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--cyan);
            border-style: solid;
            animation: cornerPing 3s infinite;
            z-index: 10;
        }

        .cam-corner.tl {
            top: 6px;
            left: 6px;
            border-width: 2px 0 0 2px;
        }

        .cam-corner.tr {
            top: 6px;
            right: 6px;
            border-width: 2px 2px 0 0;
        }

        .cam-corner.bl {
            bottom: 6px;
            left: 6px;
            border-width: 0 0 2px 2px;
        }

        .cam-corner.br {
            bottom: 6px;
            right: 6px;
            border-width: 0 2px 2px 0;
        }

        .cam-scanline {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            z-index: 9;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.6), transparent);
            animation: scanH 2s linear infinite;
            pointer-events: none;
        }

        .cam-overlay-text {
            position: absolute;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 2px 6px;
            border-radius: 2px;
        }

        .detection-box {
            position: absolute;
            border: 2px solid;
            border-radius: 2px;
            pointer-events: none;
            z-index: 8;
            transition: all 0.3s ease;
        }

        .detection-label {
            position: absolute;
            top: -20px;
            left: -1px;
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 2px 2px 0 0;
            white-space: nowrap;
            border-bottom: none;
        }

        .cam-stat-row {
            display: flex;
            gap: 6px;
            padding: 6px 8px;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .cam-stat {
            flex: 1;
            text-align: center;
            padding: 5px 4px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 2px;
        }

        .cam-stat-val {
            font-family: var(--font-mono);
            font-size: 16px;
            line-height: 1;
        }

        .cam-stat-lbl {
            font-family: var(--font-ui);
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--text3);
            margin-top: 2px;
            text-transform: uppercase;
        }

        .event-log-item {
            animation: slideIn 0.3s ease;
        }

        .cam-permission {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #050d1a, #091525);
            z-index: 20;
        }

        .pulse-ring {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            opacity: 0;
            animation: radar-expand 2s ease-out infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── SIMULATION ENGINE ───────────────────────────────────────────────────────

        const LOCATIONS = [
            { id: "bus_stop", name: "Bus Stop", lat: 17.440, lng: 78.490, x: 210, y: 190 },
            { id: "market_street", name: "Market Street", lat: 17.445, lng: 78.495, x: 310, y: 140 },
            { id: "food_street", name: "Food Street", lat: 17.435, lng: 78.485, x: 140, y: 250 },
            { id: "public_park", name: "Public Park", lat: 17.448, lng: 78.480, x: 90, y: 120 },
            { id: "college_entrance", name: "College Entrance", lat: 17.442, lng: 78.500, x: 390, y: 200 },
            { id: "railway_station", name: "Railway Station", lat: 17.430, lng: 78.495, x: 320, y: 310 },
            { id: "temple_road", name: "Temple Road", lat: 17.450, lng: 78.487, x: 180, y: 80 },
        ];

        const TRASH_TYPES = ["plastic_bottle", "food_wrapper", "paper_cup", "paper_waste", "garbage_bag", "food_container", "cigarette_butt", "plastic_bag", "tin_can"];
        const TRASH_SOURCES = {
            bus_stop: "Nearby Snack Stalls & Passenger Overflow",
            market_street: "Street Vendors & Retail Packaging",
            food_street: "Restaurant Takeaways & Food Carts",
            public_park: "Recreational Activities & Picnic Waste",
            college_entrance: "Student Footfall & Canteen Packaging",
            railway_station: "Platform Food Vendors & Transit Passengers",
            temple_road: "Devotional Offerings & Flower Waste",
        };

        const INFRA_RECS = [
            { location: "Food Street", type: "DUSTBIN", priority: "HIGH", reason: "Frequent food packaging waste near vendor cluster" },
            { location: "Bus Stop", type: "DUSTBIN", priority: "HIGH", reason: "High passenger throughput – no bins within 20m" },
            { location: "College Entrance", type: "RECYCLING", priority: "MEDIUM", reason: "High plastic/paper waste from student footfall" },
            { location: "Railway Station", type: "COMPACTOR", priority: "HIGH", reason: "Peak-hour overflow requires compacting capacity" },
            { location: "Market Street", type: "DUSTBIN", priority: "MEDIUM", reason: "Vendor packaging accumulates between cycles" },
            { location: "Public Park", type: "RECYCLING", priority: "LOW", reason: "Recreational waste suitable for sorted collection" },
        ];

        function rnd(a, b) { return a + Math.random() * (b - a); }
        function rndInt(a, b) { return Math.floor(rnd(a, b + 1)); }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function hourFactor() {
            const h = new Date().getHours();
            const peaks = { 8: 0.7, 9: 0.9, 12: 1.0, 13: 1.0, 17: 0.9, 18: 1.0, 19: 1.0, 20: 0.8 };
            return peaks[h] || 0.35;
        }

        const BASE_TRASH = { bus_stop: 65, market_street: 78, food_street: 82, public_park: 40, college_entrance: 55, railway_station: 70, temple_road: 48 };
        const BASE_CROWD = { bus_stop: 72, market_street: 60, food_street: 68, public_park: 35, college_entrance: 80, railway_station: 75, temple_road: 42 };

        function simLocation(id) {
            const hf = hourFactor();
            const noise = rnd(0.85, 1.15);
            const td = Math.min(100, Math.round((BASE_TRASH[id] || 50) * hf * noise));
            const cd = Math.min(100, Math.round((BASE_CROWD[id] || 50) * hf * noise));
            const cl = Math.max(0, 100 - Math.round(td * 0.65 + cd * 0.2 + rndInt(0, 8)));
            let rec, recDetail;
            if (td > 60 && cd < 40) { rec = "CLEAN NOW"; recDetail = `Deploy unit immediately – low crowd window`; }
            else if (cd > 70) { rec = "STANDBY"; recDetail = `High crowd – schedule in ${rndInt(20, 55)} min`; }
            else if (td > 40) { rec = "MONITOR"; recDetail = `Accumulating – escalate in ${rndInt(10, 25)} min`; }
            else { rec = "CLEAR"; recDetail = "Within acceptable thresholds"; }
            return { id, trash: td, crowd: cd, cleanliness: cl, recommendation: rec, recDetail };
        }

        function simDetections(count = 6) {
            return Array.from({ length: count }, () => ({
                id: Math.random().toString(36).slice(2, 8),
                type: pick(TRASH_TYPES),
                confidence: +rnd(0.72, 0.98).toFixed(2),
                x: +rnd(40, 560).toFixed(0),
                y: +rnd(40, 340).toFixed(0),
                w: rndInt(30, 90),
                h: rndInt(20, 60),
            }));
        }

        function simForecast() {
            return LOCATIONS.flatMap(loc => [1, 3, 6].map(h => {
                const futureH = (new Date().getHours() + h) % 24;
                const peaks = { 8: 0.7, 9: 0.9, 12: 1.0, 13: 1.0, 17: 0.9, 18: 1.0, 19: 1.0, 20: 0.8 };
                const hf = peaks[futureH] || 0.35;
                const tp = Math.min(100, Math.round(rnd(45, 90) * hf));
                const t = new Date(); t.setHours(t.getHours() + h);
                return {
                    location: loc.name, id: loc.id, hours: h,
                    time: t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
                    trash: tp,
                    severity: tp > 70 ? "HIGH" : tp > 45 ? "MEDIUM" : "LOW",
                };
            }));
        }

        function simLitterEvent() {
            const loc = pick(LOCATIONS);
            return {
                id: `EVT-${rndInt(1000, 9999)}`,
                location: loc.name,
                type: pick(TRASH_TYPES),
                ts: new Date().toLocaleTimeString(),
                confidence: +rnd(0.78, 0.97).toFixed(2),
                status: Math.random() > 0.3 ? "UNRESOLVED" : "RESOLVED",
            };
        }

        function simAlert() {
            const loc = pick(LOCATIONS);
            const msgs = [
                `Trash spike at ${loc.name} – ${rndInt(5, 15)} new objects`,
                `Crowd surge at ${loc.name} – density ${rndInt(75, 95)}%`,
                `Littering event at ${loc.name} – ${pick(TRASH_TYPES).replace(/_/g, " ")} dropped`,
                `Cleaning completed at ${loc.name}`,
                `Bin overflow alert near ${loc.name}`,
            ];
            const sevs = ["INFO", "INFO", "WARNING", "WARNING", "CRITICAL"];
            const i = rndInt(0, msgs.length - 1);
            return { id: Math.random().toString(36).slice(2, 8), msg: msgs[i], severity: sevs[i], time: new Date().toLocaleTimeString(), loc: loc.name };
        }

        // ─── HOOKS ────────────────────────────────────────────────────────────────────

        function useSimulation() {
            const [locations, setLocations] = useState(() => LOCATIONS.map(l => ({ ...l, ...simLocation(l.id) })));
            const [detections, setDetections] = useState(() => simDetections(7));
            const [forecast, setForecast] = useState(() => simForecast());
            const [litter, setLitter] = useState(() => Array.from({ length: 6 }, simLitterEvent));
            const [alerts, setAlerts] = useState(() => [simAlert(), simAlert()]);
            const [activeLocId, setActiveLocId] = useState("market_street");
            const [tick, setTick] = useState(0);

            useEffect(() => {
                const id = setInterval(() => {
                    setTick(t => t + 1);
                    setLocations(LOCATIONS.map(l => ({ ...l, ...simLocation(l.id) })));
                    if (Math.random() > 0.5) setDetections(simDetections(rndInt(4, 9)));
                    if (Math.random() > 0.6) setForecast(simForecast());
                    if (Math.random() > 0.4) setLitter(p => {
                        const e = simLitterEvent();
                        return [e, ...p].slice(0, 20);
                    });
                    if (Math.random() > 0.3) setAlerts(p => {
                        const a = simAlert();
                        return [a, ...p].slice(0, 30);
                    });
                }, 3500);
                return () => clearInterval(id);
            }, []);

            const activeData = locations.find(l => l.id === activeLocId) || locations[0];

            return { locations, detections, forecast, litter, alerts, activeLocId, setActiveLocId, activeData, tick };
        }

        // ── WebSocket + API hook ───────────────────────────────────────────────────────
        const API = "http://localhost:8000";
        const WS_URL = "ws://localhost:8000/ws";

        function useBackend(simLocations, setSimLocations, simAlerts, setSimAlerts) {
            const [wsStatus, setWsStatus] = useState("disconnected"); // disconnected|connecting|connected
            const [apiOnline, setApiOnline] = useState(false);
            const [dbReports, setDbReports] = useState([]);
            const wsRef = useRef(null);

            // Check if API is reachable
            useEffect(() => {
                async function probe() {
                    try {
                        const r = await fetch(`${API}/`, { signal: AbortSignal.timeout(2000) });
                        if (r.ok) { setApiOnline(true); fetchReports(); }
                    } catch (e) { setApiOnline(false); }
                }
                probe();
                const id = setInterval(probe, 10000);
                return () => clearInterval(id);
            }, []);

            // WebSocket connection
            useEffect(() => {
                function connect() {
                    setWsStatus("connecting");
                    try {
                        const ws = new WebSocket(WS_URL);
                        wsRef.current = ws;

                        ws.onopen = () => {
                            setWsStatus("connected");
                        };

                        ws.onmessage = (e) => {
                            try {
                                const msg = JSON.parse(e.data);
                                handleWsMessage(msg);
                            } catch (_) { }
                        };

                        ws.onclose = () => {
                            setWsStatus("disconnected");
                            // Reconnect after 3s
                            setTimeout(connect, 3000);
                        };

                        ws.onerror = () => {
                            ws.close();
                        };
                    } catch (e) {
                        setWsStatus("disconnected");
                        setTimeout(connect, 5000);
                    }
                }
                connect();
                return () => { if (wsRef.current) wsRef.current.close(); };
            }, []);

            function handleWsMessage(msg) {
                if (msg.type === "init" || msg.type === "tick") {
                    if (msg.updated_location) {
                        // Update the specific location that changed
                        setSimLocations(prev => prev.map(l =>
                            l.id === msg.updated_location.id ? { ...l, ...msg.updated_location } : l
                        ));
                    }
                    if (msg.locations) {
                        setSimLocations(prev => msg.locations.map(nl => {
                            const existing = prev.find(l => l.id === nl.id) || {};
                            return { ...existing, ...nl };
                        }));
                    }
                }
                if (msg.message || msg.type === "tick") {
                    const alert = {
                        id: Math.random().toString(36).slice(2, 8),
                        msg: msg.message || `Update from backend`,
                        severity: msg.severity || "INFO",
                        time: new Date().toLocaleTimeString(),
                        loc: msg.location || "System",
                        fromBackend: true,
                    };
                    setSimAlerts(prev => [alert, ...prev].slice(0, 40));
                }
                if (msg.type === "new_report") {
                    setDbReports(prev => [{ ...msg, ts: new Date(msg.created_at).toLocaleTimeString() }, ...prev].slice(0, 30));
                }
                if (msg.type === "yolo_detection") {
                    const alert = {
                        id: Math.random().toString(36).slice(2, 8),
                        msg: `🤖 YOLO: ${msg.class_name.replace(/_/g, " ")} detected (${Math.round(msg.confidence * 100)}%)`,
                        severity: "WARNING", time: new Date().toLocaleTimeString(), loc: "YOLO Feed", fromBackend: true,
                    };
                    setSimAlerts(prev => [alert, ...prev].slice(0, 40));
                }
            }

            async function fetchReports() {
                try {
                    const r = await fetch(`${API}/citizen-reports`);
                    if (r.ok) {
                        const data = await r.json();
                        setDbReports((data.reports || []).map(r => ({ ...r, ts: new Date(r.created_at || Date.now()).toLocaleTimeString() })));
                    }
                } catch (e) { }
            }

            async function submitReport(report) {
                if (!apiOnline) return null;
                try {
                    const r = await fetch(`${API}/citizen-reports`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(report)
                    });
                    if (r.ok) {
                        const data = await r.json();
                        await fetchReports();
                        return data.report_id;
                    }
                } catch (e) { }
                return null;
            }

            async function logCleaning(location_id, status) {
                if (!apiOnline) return;
                try {
                    await fetch(`${API}/cleaning`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ location_id, status })
                    });
                } catch (e) { }
            }

            return { wsStatus, apiOnline, dbReports, submitReport, logCleaning, fetchReports };
        }

        // ── LEAFLET MAP COMPONENT ─────────────────────────────────────────────────────
        function LeafletMap({ locations, reports, litter, onLocationClick }) {
            const mapRef = useRef(null);
            const leafletRef = useRef(null);
            const markersRef = useRef({});
            const reportMarkersRef = useRef([]);

            // Colour helpers
            const trashColor = (v) => v > 70 ? "#ff3d5a" : v > 45 ? "#ffd700" : "#00ff88";

            useEffect(() => {
                if (leafletRef.current) return; // already initialised
                // Init map centered on Hyderabad zone
                const map = L.map(mapRef.current, {
                    center: [17.440, 78.490],
                    zoom: 14,
                    zoomControl: true,
                    attributionControl: false,
                });

                // Dark tile layer
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                    maxZoom: 19,
                    opacity: 0.7,
                }).addTo(map);

                leafletRef.current = map;
                return () => { map.remove(); leafletRef.current = null; };
            }, []);

            // Update zone markers whenever location data changes
            useEffect(() => {
                const map = leafletRef.current;
                if (!map) return;

                locations.forEach(loc => {
                    const color = trashColor(loc.trash);
                    const size = 28 + Math.round(loc.trash * 0.18);

                    const icon = L.divIcon({
                        className: "",
                        html: `<div class="vigil-marker" style="
          width:${size}px;height:${size}px;
          background:${color}22;
          border-color:${color};
          color:${color};
          box-shadow:0 0 ${size}px ${color}55;
        ">${loc.trash}</div>`,
                        iconSize: [size, size],
                        iconAnchor: [size / 2, size / 2],
                    });

                    if (markersRef.current[loc.id]) {
                        markersRef.current[loc.id].setLatLng([loc.lat, loc.lng]);
                        markersRef.current[loc.id].setIcon(icon);
                        markersRef.current[loc.id].getPopup()?.setContent(popupHtml(loc));
                    } else {
                        const marker = L.marker([loc.lat, loc.lng], { icon })
                            .addTo(map)
                            .bindPopup(popupHtml(loc), { maxWidth: 220 })
                            .on("click", () => onLocationClick(loc.id));
                        markersRef.current[loc.id] = marker;
                    }
                });
            }, [locations]);

            // Citizen report pins
            useEffect(() => {
                const map = leafletRef.current;
                if (!map) return;
                // Clear old
                reportMarkersRef.current.forEach(m => m.remove());
                reportMarkersRef.current = [];

                reports.filter(r => r.lat && r.lng).forEach(r => {
                    const icon = L.divIcon({
                        className: "",
                        html: `<div style="width:14px;height:14px;background:#ff8c00;border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px #ff8c0088;"></div>`,
                        iconSize: [14, 14], iconAnchor: [7, 7],
                    });
                    const m = L.marker([r.lat, r.lng], { icon })
                        .addTo(map)
                        .bindPopup(`<b style="color:#ff8c00">📍 Citizen Report</b><br/><b>${r.location}</b><br/>${r.description}<br/><span style="color:#4a7aaa;font-size:10px">${r.reporter || "Anonymous"} · ${r.status || "PENDING"}</span>`);
                    reportMarkersRef.current.push(m);
                });
            }, [reports]);

            function popupHtml(loc) {
                const c = trashColor(loc.trash);
                return `
      <div style="font-family:'Exo 2',sans-serif">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px;color:#00d4ff">${loc.name}</div>
        <div style="display:flex;gap:6px;margin-bottom:4px">
          <span style="background:${c}22;color:${c};border:1px solid ${c}44;padding:1px 6px;border-radius:2px;font-size:10px;font-family:monospace">TRASH ${loc.trash}%</span>
          <span style="background:#ffd70022;color:#ffd700;border:1px solid #ffd70044;padding:1px 6px;border-radius:2px;font-size:10px;font-family:monospace">CROWD ${loc.crowd}%</span>
        </div>
        <div style="font-size:11px;color:#8ab0d8;margin-bottom:2px">Cleanliness: <b style="color:${c}">${loc.cleanliness}/100</b></div>
        <div style="font-size:10px;background:${c}15;padding:3px 6px;border-radius:2px;color:${c};font-weight:600">${loc.recommendation}: ${loc.recDetail}</div>
      </div>`;
            }

            return (
                <div ref={mapRef} style={{ width: "100%", height: "100%", minHeight: 380, borderRadius: 2 }} />
            );
        }

                                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: colors[d.type] || "var(--cyan)", flexShrink: 0, boxShadow: `0 0 6px ${colors[d.type] || "var(--cyan)"}` }} />
                                    <div style={{ flex: 1, fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text2)", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>

        // ── CROWD MONITOR ──────────────────────────────────────────────────────────────
        function CrowdMonitor({ locations, activeLocId }) {
            const loc = locations.find(l => l.id === activeLocId) || locations[0];
            const level = loc.crowd > 70 ? "HIGH" : loc.crowd > 40 ? "MEDIUM" : "LOW";
            const color = level === "HIGH" ? "var(--red)" : level === "MEDIUM" ? "var(--yellow)" : "var(--green)";

            return (
                <Panel title="CROWD DENSITY MONITOR" dot icon="👥" style={{ height: "100%" }}>
                    <div style={{ padding: 10 }}>
                        {/* Big gauge */}
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "8px 0" }}>
                            <div style={{ position: "relative", width: 120, height: 120 }}>
                                <svg viewBox="0 0 120 120" width="120" height="120">
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg)" strokeWidth="10" />
                                    <circle cx="60" cy="60" r="50" fill="none" stroke={color} strokeWidth="10"
                                        strokeDasharray={`${loc.crowd * 3.14} 314`}
                                        strokeLinecap="round"
                                        transform="rotate(-90 60 60)"
                                        style={{ transition: "stroke-dasharray 0.8s ease", boxShadow: `0 0 20px ${color}` }}
                                    />
                                    <text x="60" y="58" textAnchor="middle" fill={color} fontFamily="var(--font-mono)" fontSize="22" fontWeight="bold">{loc.crowd}</text>
                                    <text x="60" y="72" textAnchor="middle" fill="var(--text3)" fontFamily="var(--font-ui)" fontSize="9">DENSITY %</text>
                                </svg>
                            </div>
                            <div style={{ marginLeft: 16 }}>
                                <div style={{ fontFamily: "var(--font-ui)", fontSize: 22, fontWeight: 700, color, letterSpacing: 2 }}>{level}</div>
                                <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)", letterSpacing: 1.5, textTransform: "uppercase" }}>CROWD LEVEL</div>
                                <div style={{ marginTop: 8, fontFamily: "var(--font-main)", fontSize: 11, color: "var(--text2)", lineHeight: 1.5 }}>
                                    Est. persons: {Math.round(loc.crowd * 0.8)}<br />
                                    Clean window: {loc.crowd > 70 ? "BLOCKED" : `In ${rndInt(5, 30)}m`}
                                </div>
                            </div>
                        </div>

                        {/* All locations mini */}
                        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 8 }}>
                            {locations.map(l => {
                                const c = l.crowd > 70 ? "var(--red)" : l.crowd > 40 ? "var(--yellow)" : "var(--green)";
                                return (
                                    <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }} className="row-hover">
                                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)", width: 16 }}>{l.crowd}%</div>
                                        <MiniBar val={l.crowd} color={c} />
                                        <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text2)", width: 90, textAlign: "right", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{l.name}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </Panel>
            );
        }

        // ── CLEANING DECISIONS ─────────────────────────────────────────────────────────
        function CleaningDecisions({ locations }) {

                <Panel title="SMART CLEANING OPERATIONS" dot icon="🚛" style={{ height: "100%" }}>
                    <div style={{ padding: 8, overflow: "auto", maxHeight: 300 }}>
                        {locations.map(l => {
                            const tc = l.recommendation === "CLEAN NOW" ? "var(--red)" : l.recommendation === "MONITOR" ? "var(--yellow)" : "var(--green)";
                            return (
                                <div key={l.id} style={{
                                    padding: "8px 10px", marginBottom: 5,
                                    background: "var(--bg)", borderRadius: 2,
                                    borderLeft: `3px solid ${tc}`,
                                }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                                        <span style={{ fontFamily: "var(--font-ui)", fontSize: 12, fontWeight: 600, color: "var(--text)" }}>{l.name}</span>

                                    <div style={{ fontFamily: "var(--font-main)", fontSize: 10, color: "var(--text3)", marginBottom: 4 }}>{l.recDetail}</div>
                                    <div style={{ display: "flex", gap: 8 }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                            <span style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)" }}>TRASH</span>

                                        </div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                            <span style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)" }}>CROWD</span>
                                            <MiniBar val={l.crowd} color="var(--yellow)" />
                                            <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--yellow)" }}>{l.crowd}%</span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </Panel>

        // ── HEATMAP ────────────────────────────────────────────────────────────────────
        function WasteHeatmap({ locations, activeLocId, setActiveLocId }) {
            const colorScale = (v) => {
                if (v > 70) return { fill: "rgba(255,61,90,0.7)", stroke: "#ff3d5a", glow: "rgba(255,61,90,0.5)" };
                if (v > 45) return { fill: "rgba(255,215,0,0.5)", stroke: "#ffd700", glow: "rgba(255,215,0,0.4)" };
                return { fill: "rgba(0,255,136,0.35)", stroke: "#00ff88", glow: "rgba(0,255,136,0.3)" };
            };

            return (
                <Panel title="WASTE HEATMAP" dot icon="🗺️" style={{ height: "100%" }}>
                    <div style={{ padding: 8 }}>
                        <div style={{ position: "relative", height: 360, background: "var(--bg)", borderRadius: 2, border: "1px solid var(--border)", overflow: "hidden" }}>
                            {/* Grid */}
                            <svg width="100%" height="100%" viewBox="0 0 480 360" style={{ position: "absolute", inset: 0 }}>
                                <defs>
                                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(26,58,106,0.4)" strokeWidth="0.5" />
                                    </pattern>
                                </defs>
                                <rect width="480" height="360" fill="url(#grid)" style={{ animation: "gridScroll 4s linear infinite" }} />
                                {/* Roads */}
                                <path d="M 0 200 Q 240 180 480 200" stroke="rgba(26,58,106,0.6)" strokeWidth="3" fill="none" />
                                <path d="M 240 0 Q 260 180 240 360" stroke="rgba(26,58,106,0.6)" strokeWidth="3" fill="none" />
                                <path d="M 0 120 L 480 140" stroke="rgba(26,58,106,0.3)" strokeWidth="1.5" fill="none" />
                                {/* Legend */}
                                <text x="8" y="345" fontFamily="Share Tech Mono" fontSize="9" fill="rgba(74,122,170,0.8)">LAT 17.430–17.450 | LNG 78.480–78.500</text>
                            </svg>
                            {/* Location blobs */}
                            {locations.map(loc => {
                                const cs = colorScale(loc.trash);
                                const isActive = loc.id === activeLocId;
                                const blobSize = 20 + loc.trash * 0.25;
                                return (
                                    <div key={loc.id}
                                        onClick={() => setActiveLocId(loc.id)}
                                        style={{
                                            position: "absolute",
                                            left: loc.x + "px", top: loc.y + "px",
                                            cursor: "pointer",
                                            transform: "translate(-50%,-50%)",
                                            zIndex: isActive ? 10 : 5,
                                        }}>
                                        {/* Blob */}
                                        <div style={{
                                            position: "absolute",
                                            width: blobSize * 2, height: blobSize * 2,
                                            borderRadius: "50%",
                                            background: cs.fill,
                                            border: `2px solid ${cs.stroke}`,
                                            boxShadow: `0 0 ${blobSize}px ${cs.glow}`,
                                            transform: "translate(-50%,-50%)",
                                            animation: "pulse 3s infinite",
                                            transition: "all 0.5s",
                                        }} />
                                        {/* Ping ring for active */}
                                        {isActive && <div className="radar-ping" style={{ width: 60, height: 60, left: -30, top: -30, borderColor: cs.stroke }} />}
                                        {/* Label */}
                                        <div style={{
                                            position: "absolute",
                                            top: blobSize + 8, left: "50%",
                                            transform: "translateX(-50%)",
                                            whiteSpace: "nowrap",
                                            fontFamily: "var(--font-ui)", fontSize: 9,
                                            color: isActive ? cs.stroke : "var(--text2)",
                                            background: "rgba(6,12,20,0.85)",
                                            padding: "2px 6px", borderRadius: 2,
                                            border: `1px solid ${cs.stroke}40`,
                                        }}>
                                            {loc.name}
                                            <div style={{ fontFamily: "var(--font-mono)", fontSize: 8, color: cs.stroke, textAlign: "center" }}>{loc.trash}%</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        {/* Legend */}
                        <div style={{ display: "flex", gap: 12, padding: "6px 4px" }}>
                            {[{ color: "var(--red)", "label": "Heavy (>70%)" }, { "color": "var(--yellow)", "label": "Moderate (45–70%)" }, { "color": "var(--green)", "label": "Clean (<45%)" }].map(l => (
                                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: l.color, boxShadow: `0 0 6px ${l.color}` }} />
                                    <span style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)" }}>{l.label}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </Panel>
            );
        }

        // ── WASTE FORECAST ─────────────────────────────────────────────────────────────
        function WasteForecast({ forecast }) {
            const top = forecast.filter(f => f.severity === "HIGH").slice(0, 6);
            return (
                <Panel title="WASTE FORECAST ANALYTICS" dot icon="📊" style={{ height: "100%" }}>
                    <div style={{ padding: 8, overflow: "auto", maxHeight: 320 }}>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 6, marginBottom: 8 }}>
                            {[1, 3, 6].map(h => {
                                const group = forecast.filter(f => f.hours === h);
                                const avg = Math.round(group.reduce((a, f) => a + f.trash, 0) / group.length);
                                return (
                                    <div key={h} style={{
                                        background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 2,
                                        padding: "8px 10px", textAlign: "center"
                                    }}>
                                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 20, color: avg > 70 ? "var(--red)" : avg > 45 ? "var(--yellow)" : "var(--green)" }}>{avg}%</div>
                                        <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)", letterSpacing: 1 }}>+{h}H FORECAST</div>
                                    </div>
                                );
                            })}
                        </div>
                        {top.map((f, i) => (
                            <div key={i} style={{
                                display: "flex", alignItems: "center", gap: 8,
                                padding: "6px 8px", marginBottom: 3,
                                background: "rgba(255,61,90,0.05)",
                                border: "1px solid rgba(255,61,90,0.15)", borderRadius: 2
                            }}>
                                <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--red)", width: 40 }}>{f.time}</span>
                                <div style={{ flex: 1 }}>
                                    <div style={{ fontFamily: "var(--font-ui)", fontSize: 11, color: "var(--text)" }}>
                                        {f.location}
                                    </div>
                                    <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)" }}>
                                        Heavy trash accumulation predicted
                                    </div>
                                </div>
                                <div style={{ textAlign: "right" }}>
                                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--red)" }}>{f.trash}%</div>
                                    <SeverityBadge v={f.severity} />
                                </div>
                            </div>
                        ))}
                        {forecast.filter(f => f.severity !== "HIGH").slice(0, 4).map((f, i) => (
                            <div key={i} style={{
                                display: "flex", alignItems: "center", gap: 8,
                                padding: "5px 8px", marginBottom: 3,
                                background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 2
                            }}>
                                <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text3)", width: 40 }}>{f.time}</span>
                                <div style={{ flex: 1, fontFamily: "var(--font-ui)", fontSize: 11, color: "var(--text2)" }}>{f.location}</div>
                                <div style={{ textAlign: "right" }}>
                                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: f.severity === "MEDIUM" ? "var(--yellow)" : "var(--green)" }}>{f.trash}%</div>
                                    <SeverityBadge v={f.severity} />
                                </div>
                            </div>
                        ))}
                    </div>
                </Panel>
            );
        }

        // ── CLEANLINESS SCOREBOARD ─────────────────────────────────────────────────────
        function CleanlinessScoreboard({ locations }) {
            const sorted = [...locations].sort((a, b) => b.cleanliness - a.cleanliness);

                                    <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)", width: 14 }}>#{i + 1}</span>
                                        <span style={{ flex: 1, fontFamily: "var(--font-ui)", fontSize: 10, color: "var(--text2)", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>{l.name}</span>
                                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--green)" }}>{l.cleanliness}</span>
                                    </div>
                                ))}
                            </div>
                            <div style={{ background: "var(--bg)", borderRadius: 2, border: "1px solid var(--border)", padding: 6 }}>
                                <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, letterSpacing: 1.5, color: "var(--red)", marginBottom: 5 }}>▼ TOP 3 CRITICAL</div>
                                {sorted.slice(-3).reverse().map((l, i) => (
                                    <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)", width: 14 }}>#{i + 1}</span>
                                        <span style={{ flex: 1, fontFamily: "var(--font-ui)", fontSize: 10, color: "var(--text2)", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>{l.name}</span>
                                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--red)" }}>{l.cleanliness}</span>

                                </div>
                                <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: CleanlinessColor(l.cleanliness), width: 32, textAlign: "right" }}>{l.cleanliness}</div>
                            </div>
                        ))}
                    </div>
                </Panel>
            );
        }

        // ── LITTER MONITOR ─────────────────────────────────────────────────────────────
        function LitterMonitor({ litter }) {

                                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)" }}>{e.type.replace(/_/g, " ")} · {Math.round(e.confidence * 100)}%</div>

            "toothbrush": { label: "Plastic Waste", color: "#8888ff", cat: "TRASH" },

            "remote": { label: "E-Waste", color: "#ff3d5a", cat: "TRASH" },
            "keyboard": { label: "E-Waste", color: "#ff3d5a", cat: "TRASH" },
            "mouse": { label: "E-Waste", color: "#ff3d5a", cat: "TRASH" },
            "laptop": { label: "E-Waste", color: "#ff3d5a", cat: "TRASH" },

            "backpack": { label: "Bag/Waste", color: "#a855f7", cat: "TRASH" },

            "umbrella": { label: "Abandoned Item", color: "#ff8c00", cat: "TRASH" },
            "tie": { label: "Textile Waste", color: "#cc88ff", cat: "TRASH" },
            "vase": { label: "Ceramic Waste", color: "#aaddff", cat: "TRASH" },
            "clock": { label: "Abandoned Item", color: "#ff8c00", cat: "TRASH" },
            // People
