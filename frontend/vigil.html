            "truck": { label: "Truck", color: "#4488ff", cat: "VEHICLE" },
            "bus": { label: "Bus", color: "#4488ff", cat: "VEHICLE" },
            "bicycle": { label: "Bicycle", color: "#44ccff", cat: "VEHICLE" },
            "motorcycle": { label: "Motorcycle", color: "#44ccff", cat: "VEHICLE" },
        };

        function LiveCamDetector() {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);
            const modelRef = useRef(null);
            const rafRef = useRef(null);

            // camState: idle | loadingModel | requesting | active | denied | error
            const [camState, setCamState] = useState("idle");
            const [modelReady, setModelReady] = useState(false);
            const [loadProgress, setLoadProgress] = useState(0);
            const [detBoxes, setDetBoxes] = useState([]);
            const [eventLog, setEventLog] = useState([]);
            const [trashCount, setTrashCount] = useState(0);
            const [personCount, setPersonCount] = useState(0);
            const [alertCount, setAlertCount] = useState(0);
            const [showBoxes, setShowBoxes] = useState(true);
            const [confThresh, setConfThresh] = useState(0.40);
            const [fps, setFps] = useState(0);
            const [totalDetected, setTotalDetected] = useState(0);
            // litter heuristic: track if person was recently near an object
            const prevPersonBoxes = useRef([]);
            const fpsRef = useRef({ frames: 0, last: Date.now() });
            const showRef = useRef(true);
            const confRef = useRef(0.40);
            useEffect(() => { showRef.current = showBoxes; }, [showBoxes]);
            useEffect(() => { confRef.current = confThresh; }, [confThresh]);

            // ── Load TF model on mount ──
            useEffect(() => {
                let cancelled = false;

                function waitForGlobals(cb, attempts = 0) {
                    // Poll until both tf and cocoSsd are available on window
                    if (typeof window.tf !== "undefined" && typeof window.cocoSsd !== "undefined") {
                        cb();
                    } else if (attempts > 40) {
                        // After ~10s give up
                        if (!cancelled) setCamState("error");
                    } else {
                        setTimeout(() => waitForGlobals(cb, attempts + 1), 250);
                    }
                }

                async function loadModel() {
                    setCamState("loadingModel");
                    setLoadProgress(10);
                    try {
                        // Initialise WebGL backend
                        await window.tf.setBackend("webgl");
                        await window.tf.ready();
                        setLoadProgress(35);

                        // Load COCO-SSD with lite MobileNetV2 base
                        const model = await window.cocoSsd.load({ base: "lite_mobilenet_v2" });
                        if (cancelled) return;
                        setLoadProgress(85);
                        modelRef.current = model;

                        // Warm-up: create a proper RGB canvas element so the model compiles shaders
                        const warmupCanvas = document.createElement("canvas");
                        warmupCanvas.width = 64; warmupCanvas.height = 64;
                        const wCtx = warmupCanvas.getContext("2d");
                        wCtx.fillStyle = "#333"; wCtx.fillRect(0, 0, 64, 64);
                        await model.detect(warmupCanvas);

                        if (cancelled) return;
                        setLoadProgress(100);
                        setModelReady(true);
                        setCamState("idle");
                    } catch (e) {
                        console.error("VIGIL model load error:", e);
                        if (!cancelled) setCamState("error");
                    }
                }

                waitForGlobals(loadModel);
                return () => { cancelled = true; };
            }, []);

            // ── Draw boxes on canvas ──
            const drawBoxes = useCallback((predictions, vidW, vidH) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext("2d");
                canvas.width = vidW;
                canvas.height = vidH;
                ctx.clearRect(0, 0, vidW, vidH);
                if (!showRef.current) return;

                predictions.forEach(p => {
                    const info = COCO_TO_VIGIL[p.class];
                    if (!info) return;
                    const [bx, by, bw, bh] = p.bbox;
                    const color = info.color;
                    const conf = p.score;
                    const isAlert = info.cat === "ALERT";
                    const isPerson = info.cat === "PERSON";

                    // Glow
                    ctx.shadowColor = color;
                    ctx.shadowBlur = isPerson ? 14 : isAlert ? 22 : 10;

                    // Box outline
                    ctx.strokeStyle = color;
                    ctx.lineWidth = isAlert ? 3 : isPerson ? 2.5 : 2;
                    ctx.strokeRect(bx, by, bw, bh);

                    // Military corner brackets
                    const cs = Math.min(14, bw * 0.2, bh * 0.2);
                    ctx.lineWidth = 3;
                    [[bx, by], [bx + bw, by], [bx, by + bh], [bx + bw, by + bh]].forEach(([cx, cy], i) => {
                        ctx.beginPath();
                        const dx = i % 2 === 0 ? cs : -cs;
                        const dy = i < 2 ? cs : -cs;
                        ctx.moveTo(cx, cy + dy); ctx.lineTo(cx, cy); ctx.lineTo(cx + dx, cy);
                        ctx.stroke();
                    });
                    ctx.shadowBlur = 0;

                    // Label chip
                    const labelText = `${info.label}  ${Math.round(conf * 100)}%`;
                    ctx.font = "bold 11px 'Share Tech Mono',monospace";
                    const tw = ctx.measureText(labelText).width + 12;
                    const chipH = 18;
                    // Clip label inside canvas
                    const chipY = by >= chipH + 2 ? by - chipH : by + bh + 2;
                    ctx.fillStyle = color + "ee";
                    ctx.fillRect(bx - 1, chipY, tw, chipH);
                    ctx.fillStyle = "#000";
                    ctx.fillText(labelText, bx + 5, chipY + 13);

                    // Confidence bar along bottom edge of box
                    ctx.fillStyle = "rgba(0,0,0,0.55)";
                    ctx.fillRect(bx, by + bh, bw, 4);
                    ctx.fillStyle = color;
                    ctx.fillRect(bx, by + bh, bw * conf, 4);
                });
            }, []);

            // ── Detection loop (requestAnimationFrame) ──
            useEffect(() => {
                if (camState !== "active") return;
                let active = true;
                let lastDetect = 0;
                const DETECT_INTERVAL = 200; // ms between inference calls

                async function loop(ts) {
                    if (!active) return;
                    rafRef.current = requestAnimationFrame(loop);

                    // FPS counter
                    fpsRef.current.frames++;
                    const now = Date.now();
                    if (now - fpsRef.current.last >= 1000) {
                        setFps(fpsRef.current.frames);
                        fpsRef.current = { frames: 0, last: now };
                    }

                    // Throttle inference
                    if (now - lastDetect < DETECT_INTERVAL) return;
                    lastDetect = now;

                    const video = videoRef.current;
                    const model = modelRef.current;
                    if (!video || !model || video.readyState < 2 || video.videoWidth === 0) return;

                    let predictions;
                    try {
                        predictions = await model.detect(video, 20, confRef.current);
                    } catch (e) { return; }

                    if (!active) return;

                    const vidW = video.videoWidth;
                    const vidH = video.videoHeight;

                    // Map to VIGIL boxes (filter to only classes we care about)
                    const boxes = predictions
                        .filter(p => COCO_TO_VIGIL[p.class])
                        .map(p => ({
                            id: Math.random().toString(36).slice(2, 8),
                            raw: p.class,
                            info: COCO_TO_VIGIL[p.class],
                            bbox: p.bbox,
                            conf: p.score,
                        }));

                    setDetBoxes(boxes);

                    const tc = boxes.filter(b => b.info.cat === "TRASH").length;
                    const pc = boxes.filter(b => b.info.cat === "PERSON").length;
                    setTrashCount(tc);
                    setPersonCount(pc);
                    setAlertCount(0);
                    setTotalDetected(n => n + tc);

                    // Litter heuristic: if a person bbox overlaps or is close to a trash bbox → litter event
                    const personBoxes = boxes.filter(b => b.info.cat === "PERSON");
                    const trashBoxes = boxes.filter(b => b.info.cat === "TRASH");
                    personBoxes.forEach(pb => {
                        const [px, py, pw, ph] = pb.bbox;
                        trashBoxes.forEach(tb => {
                            const [tx, ty, tw, th] = tb.bbox;
                            const overlap = !(px > tx + tw || px + pw < tx || py > ty + th || py + ph < ty);
                            const proximity = Math.abs((px + pw / 2) - (tx + tw / 2)) < 80 && Math.abs((py + ph / 2) - (ty + th / 2)) < 80;
                            if ((overlap || proximity) && Math.random() < 0.04) {
                                const evtId = "litter-" + Date.now();
                                setAlertCount(1);
                                setEventLog(prev => [{
                                    id: evtId,
                                    msg: `Person near ${tb.info.label} – possible litter event`,
                                    time: new Date().toLocaleTimeString(),
                                    conf: +(pb.conf * 0.8 + tb.conf * 0.2).toFixed(2),
                                    type: tb.info.label,
                                }, ...prev].slice(0, 30));
                            }
                        });
                    });

                    // Draw boxes — pass raw predictions array with our mapped info attached
                    drawBoxes(
                        predictions.filter(p => COCO_TO_VIGIL[p.class]).map(p => ({ ...p, info: COCO_TO_VIGIL[p.class] })),
                        vidW, vidH
                    );
                }

                rafRef.current = requestAnimationFrame(loop);
                return () => {
                    active = false;
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, [camState, drawBoxes]);

            // ── Start camera ──
            async function startCam() {
                if (!modelReady) { alert("AI model still loading, please wait a moment…"); return; }
                setCamState("requesting");
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                        audio: false,
                    });
                    streamRef.current = stream;
                    const video = videoRef.current;
                    if (video) {
                        video.srcObject = stream;
                        await new Promise(res => { video.onloadedmetadata = () => res(); });
                        await video.play();
                    }
                    setCamState("active");
                } catch (e) {
                    if (e.name === "NotAllowedError" || e.name === "PermissionDeniedError") setCamState("denied");
                    else { console.error(e); setCamState("error"); }
                }
            }

            function stopCam() {
                if (rafRef.current) cancelAnimationFrame(rafRef.current);
                if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                streamRef.current = null;
                if (videoRef.current) videoRef.current.srcObject = null;
                const canvas = canvasRef.current;
                if (canvas) { const ctx = canvas.getContext("2d"); ctx.clearRect(0, 0, canvas.width, canvas.height); }
                setDetBoxes([]); setTrashCount(0); setPersonCount(0); setAlertCount(0);
                setCamState("idle");
            }

            const crowdLevel = personCount >= 4 ? "HIGH" : personCount >= 2 ? "MEDIUM" : "LOW";
            const trashLevel = trashCount >= 3 ? "HIGH" : trashCount >= 1 ? "MEDIUM" : "LOW";
            const crowdColor = crowdLevel === "HIGH" ? "var(--red)" : crowdLevel === "MEDIUM" ? "var(--yellow)" : "var(--green)";
            const trashColor = trashLevel === "HIGH" ? "var(--red)" : trashLevel === "MEDIUM" ? "var(--yellow)" : "var(--green)";

            const modelStatusColor = camState === "loadingModel" ? "var(--yellow)" : modelReady ? "var(--green)" : "var(--text3)";
            const modelStatusText = camState === "loadingModel" ? `LOADING ${loadProgress}%` : modelReady ? "MODEL READY" : "INITIALISING";

            return (
                <Panel title="LIVE CAM — REAL AI DETECTION" dot icon="📷" style={{ height: "100%" }}>
                    <div style={{ padding: 8 }}>

                        {/* ── Model status bar ── */}
                        <div style={{
                            display: "flex", alignItems: "center", gap: 8,
                            padding: "4px 8px", marginBottom: 6,
                            background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 2
                        }}>
                            <span style={{
                                width: 7, height: 7, borderRadius: "50%", background: modelStatusColor, flexShrink: 0,
                                boxShadow: `0 0 8px ${modelStatusColor}`,
                                animation: camState === "loadingModel" ? "pulse 0.8s infinite" : "none",
                                display: "block"
                            }} />
                            <span style={{ fontFamily: "var(--font-ui)", fontSize: 9, letterSpacing: 1.5, color: modelStatusColor }}>
                                COCO-SSD {modelStatusText}
                            </span>
                            {camState === "loadingModel" && (
                                <div style={{ flex: 1, background: "var(--bg3)", borderRadius: 2, height: 4, overflow: "hidden" }}>
                                    <div style={{ width: `${loadProgress}%`, height: "100%", background: "var(--yellow)", borderRadius: 2, transition: "width 0.5s" }} />
                                </div>
                            )}
                            {modelReady && <span style={{ marginLeft: "auto", fontFamily: "var(--font-ui)", fontSize: 9, color: "var(--text3)" }}>TF.js · MobileNetV2</span>}
                        </div>

                        {/* ── Camera Viewport ── */}
                        <div className="cam-wrap" style={{ marginBottom: 6 }}>
                            <video ref={videoRef} muted playsInline
                                style={{ width: "100%", height: "100%", objectFit: "cover", display: camState === "active" ? "block" : "none" }} />
                            <canvas ref={canvasRef}
                                style={{
                                    position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 8,
                                    display: camState === "active" ? "block" : "none"
                                }} />

                            {camState === "active" && <>
                                <div className="cam-scanline" />
                                <div className="cam-corner tl" /><div className="cam-corner tr" />
                                <div className="cam-corner bl" /><div className="cam-corner br" />
                                <div className="cam-overlay-text" style={{ top: 8, left: 8, color: "var(--red)" }}>● REC &nbsp; AI VISION</div>
                                <div className="cam-overlay-text" style={{ top: 8, right: 8, color: "var(--cyan)" }}>VIGIL·AI · {fps} FPS</div>
                                <div className="cam-overlay-text" style={{ bottom: 8, left: 8, color: "var(--green)" }}>
                                    🗑 {trashCount} &nbsp;|&nbsp; 👤 {personCount} &nbsp;|&nbsp; TOTAL: {totalDetected}
                                </div>
                                <div className="cam-overlay-text" style={{ bottom: 8, right: 8, color: crowdColor }}>CROWD: {crowdLevel}</div>
                                {alertCount > 0 && (
                                    <div style={{
                                        position: "absolute", top: "38%", left: "50%", transform: "translate(-50%,-50%)",
                                        zIndex: 15, fontFamily: "var(--font-ui)", fontSize: 13, fontWeight: 700, letterSpacing: 3,
                                        color: "var(--red)", background: "rgba(255,61,90,0.18)",
                                        border: "2px solid var(--red)", padding: "7px 18px", borderRadius: 2,
                                        animation: "glowPulse 1s infinite", whiteSpace: "nowrap",
                                    }}>⚠ LITTER EVENT DETECTED</div>
                                )}
                            </>}

                            {camState !== "active" && (
                                <div className="cam-permission">
                                    <div style={{ position: "relative", width: 70, height: 70, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                        {[0, 0.7, 1.4].map((d, i) => <div key={i} className="pulse-ring" style={{ animationDelay: `${d}s` }} />)}
                                        <span style={{ fontSize: 28, zIndex: 1 }}>📷</span>
                                    </div>

                                    {(camState === "idle" || camState === "loadingModel") && (
                                        <>
                                            <div style={{ fontFamily: "var(--font-ui)", fontSize: 13, fontWeight: 700, letterSpacing: 2, color: "var(--text)" }}>
                                                {modelReady ? "WEBCAM FEED INACTIVE" : "LOADING AI MODEL…"}
                                            </div>
                                            <div style={{ fontFamily: "var(--font-main)", fontSize: 11, color: "var(--text3)", textAlign: "center", maxWidth: 280, lineHeight: 1.7 }}>
                                                {modelReady
                                                    ? "Real TensorFlow.js COCO-SSD model loaded. Point your camera at objects to detect them live."
                                                    : `Downloading MobileNetV2 model… ${loadProgress}%`}
                                            </div>
                                            {modelReady && (
                                                <button className="btn btn-green" onClick={startCam} style={{ padding: "10px 24px", fontSize: 12 }}>
                                                    ▶ START REAL AI DETECTION
                                                </button>
                                            )}
                                            {!modelReady && (
                                                <div style={{ width: 200, background: "var(--bg3)", borderRadius: 3, height: 6, overflow: "hidden" }}>
                                                    <div style={{ width: `${loadProgress}%`, height: "100%", background: "var(--yellow)", transition: "width 0.5s" }} />
                                                </div>
                                            )}
                                        </>
                                    )}

                                    {camState === "requesting" && (
                                        <div style={{ fontFamily: "var(--font-ui)", fontSize: 13, color: "var(--yellow)", letterSpacing: 2, animation: "pulse 1s infinite" }}>
                                            ◉ REQUESTING CAMERA ACCESS…
                                        </div>
                                    )}

                                    {camState === "denied" && (
                                        <>
                                            <div style={{ fontFamily: "var(--font-ui)", fontSize: 13, color: "var(--red)", letterSpacing: 2 }}>⛔ CAMERA ACCESS DENIED</div>
                                            <div style={{ fontFamily: "var(--font-main)", fontSize: 11, color: "var(--text3)", textAlign: "center", maxWidth: 260, lineHeight: 1.6 }}>
                                                Allow camera access in your browser address bar, then click Retry.
                                            </div>
                                            <button className="btn" onClick={startCam}>↺ RETRY</button>
                                        </>
                                    )}

                                    {camState === "error" && (
                                        <>
                                            <div style={{ fontFamily: "var(--font-ui)", fontSize: 13, color: "var(--red)", letterSpacing: 2 }}>⚠ MODEL LOAD FAILED</div>
                                            <div style={{ fontFamily: "var(--font-main)", fontSize: 11, color: "var(--text3)", textAlign: "center", maxWidth: 300, lineHeight: 1.8 }}>
                                                Could not load TensorFlow.js.<br />
                                                <span style={{ color: "var(--yellow)" }}>Check you have internet access</span> — the AI model (~8MB) downloads from CDN on first load.<br />
                                                Open browser DevTools (F12) → Console for details.
                                            </div>
                                            <button className="btn" onClick={() => window.location.reload()}>↺ RELOAD PAGE</button>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* ── Stats ── */}
                        <div className="cam-stat-row" style={{ borderRadius: 2, marginBottom: 6 }}>
                            {[
                                { val: trashCount, color: trashColor, lbl: "TRASH OBJ" },
                                { val: personCount, color: crowdColor, lbl: "PERSONS" },
                                { val: alertCount, color: "var(--red)", lbl: "ALERTS" },
                                { val: fps, color: "var(--cyan)", lbl: "FPS" },
                            ].map(s => (
                                <div key={s.lbl} className="cam-stat">
                                    <div className="cam-stat-val" style={{ color: s.color }}>{s.val}</div>
                                    <div className="cam-stat-lbl">{s.lbl}</div>
                                </div>
                            ))}
                        </div>

                        {/* ── Controls ── */}
                        <div style={{ display: "flex", gap: 5, marginBottom: 6 }}>
                            {camState === "active"
                                ? <button className="btn btn-danger" onClick={stopCam} style={{ flex: 1, justifyContent: "center", fontSize: 10 }}>⏹ STOP</button>
                                : <button className="btn btn-green" onClick={startCam} disabled={!modelReady}
                                    style={{ flex: 1, justifyContent: "center", fontSize: 10, opacity: modelReady ? 1 : 0.5, cursor: modelReady ? "pointer" : "not-allowed" }}>
                                    ▶ START
                                </button>
                            }
                            <button className={`btn ${showBoxes ? "btn-green" : ""}`}
                                onClick={() => setShowBoxes(v => !v)}
                                style={{ flex: 1, justifyContent: "center", fontSize: 10 }}>
                                {showBoxes ? "🔲 BOXES ON" : "⬜ BOXES OFF"}
                            </button>
                        </div>

                        {/* ── Confidence threshold ── */}
                        <div style={{ marginBottom: 6, background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 2, padding: "6px 10px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                <span style={{ fontFamily: "var(--font-ui)", fontSize: 9, letterSpacing: 1.5, color: "var(--text3)" }}>MIN CONFIDENCE THRESHOLD</span>
                                <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--cyan)" }}>{Math.round(confThresh * 100)}%</span>
                            </div>
                            <input type="range" min="0.15" max="0.95" step="0.05" value={confThresh}
                                onChange={e => setConfThresh(+e.target.value)}
                                style={{ width: "100%", accentColor: "var(--cyan)", cursor: "pointer" }} />
                            <div style={{ fontFamily: "var(--font-ui)", fontSize: 8, color: "var(--text3)", marginTop: 3 }}>
                                Lower = more detections · Higher = only confident ones
                            </div>
                        </div>

                        {/* ── Live detection list ── */}
                        {detBoxes.length > 0 && (
                            <div style={{ marginBottom: 6 }}>
                                <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, letterSpacing: 1.5, color: "var(--text3)", marginBottom: 4 }}>
                                    ACTIVE DETECTIONS ({detBoxes.length})
                                </div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 3, maxHeight: 100, overflow: "auto" }}>
                                    {detBoxes.map(b => (
                                        <div key={b.id} style={{
                                            display: "flex", alignItems: "center", gap: 5,
                                            padding: "3px 6px", background: "var(--bg)", borderRadius: 2,
                                            border: `1px solid ${b.info.color}30`,
                                        }}>
                                            <div style={{ width: 7, height: 7, borderRadius: "50%", background: b.info.color, flexShrink: 0, boxShadow: `0 0 5px ${b.info.color}` }} />
                                            <div style={{ flex: 1, fontFamily: "var(--font-mono)", fontSize: 8, color: "var(--text2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                                {b.info.label}
                                            </div>
                                            <span style={{ fontFamily: "var(--font-mono)", fontSize: 8, color: b.info.color }}>{Math.round(b.conf * 100)}%</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ── What it can detect info ── */}
                        {camState === "idle" && modelReady && (
                            <div style={{
                                background: "rgba(0,212,255,0.04)", border: "1px solid rgba(0,212,255,0.15)",
                                borderRadius: 2, padding: "6px 10px", marginBottom: 6
                            }}>
                                <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, letterSpacing: 1.5, color: "var(--cyan)", marginBottom: 4 }}>
                                    DETECTABLE OBJECTS (80 COCO classes)
                                </div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                                    {["Bottles", "Cups", "Bags", "Books", "Food", "E-Waste", "Persons", "Scissors", "Phones"].map(t => (
                                        <span key={t} className="badge badge-cyan" style={{ fontSize: 8 }}>{t}</span>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ── Event log ── */}
                        <div>
                            <div style={{ fontFamily: "var(--font-ui)", fontSize: 9, letterSpacing: 1.5, color: "var(--text3)", marginBottom: 4 }}>
                                LITTER EVENT LOG
                            </div>
                            <div style={{ maxHeight: 110, overflow: "auto" }}>
                                {eventLog.length === 0 ? (
                                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)", padding: "6px 0", textAlign: "center" }}>
                                        — No litter events detected yet —
                                    </div>
                                ) : eventLog.map(e => (
                                    <div key={e.id} className="event-log-item" style={{
                                        display: "flex", gap: 6, padding: "4px 6px", marginBottom: 2,
                                        background: "rgba(255,61,90,0.06)", border: "1px solid rgba(255,61,90,0.2)", borderRadius: 2,
                                    }}>
                                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 8, color: "var(--text3)", flexShrink: 0, paddingTop: 1 }}>{e.time}</span>
                                        <span style={{ fontFamily: "var(--font-main)", fontSize: 9, color: "var(--red)", flex: 1 }}>{e.msg}</span>
                                        <span style={{ fontFamily: "var(--font-mono)", fontSize: 8, color: "var(--orange)", flexShrink: 0 }}>{Math.round(e.conf * 100)}%</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </div>
                </Panel>
            );
        }

        // ─── MAIN APP ─────────────────────────────────────────────────────────────────

        function App() {
            const sim = useSimulation();
            const { locations, setLocations } = (() => {
                // expose setLocations from sim for WS updates
                const [locations, setLocations] = useState(() => LOCATIONS.map(l => ({ ...l, ...simLocation(l.id) })));
                return { locations, setLocations };
            })();

            // We need mutable state for alerts too
            const [alerts, setAlerts] = useState(() => [simAlert(), simAlert()]);

            // Use sim for detections/forecast/litter/tick
            const { detections, forecast, litter, activeLocId, setActiveLocId, tick } = sim;

            // WebSocket + API backend
            const { wsStatus, apiOnline, dbReports, submitReport, logCleaning } =
                useBackend(locations, setLocations, alerts, setAlerts);

            // Keep locations + alerts in sync with simulation ticks
            useEffect(() => {
                const id = setInterval(() => {
                    setLocations(LOCATIONS.map(l => ({ ...l, ...simLocation(l.id) })));
                    if (Math.random() > 0.35) setAlerts(p => [simAlert(), ...p].slice(0, 40));
                }, 3500);
                return () => clearInterval(id);
            }, []);

            const [tab, setTab] = useState("overview");

            const tabs = [
                { id: "overview", label: "OVERVIEW", icon: "⬡" },
                { id: "map", label: "LIVE MAP", icon: "🗺️" },
                { id: "livecam", label: "LIVE CAM", icon: "📷" },
                { id: "detection", label: "DETECTION", icon: "🎯" },
                { id: "analytics", label: "ANALYTICS", icon: "📈" },
                { id: "operations", label: "OPERATIONS", icon: "🚛" },
                { id: "reports", label: "REPORTS", icon: "📋" },
            ];

            return (
                <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", background: "var(--bg)" }}>
                    <Header alerts={alerts} tick={tick} wsStatus={wsStatus} apiOnline={apiOnline} />

                    {/* Tab bar */}
                    <div style={{ display: "flex", borderBottom: "1px solid var(--border)", background: "var(--bg2)", padding: "0 16px", gap: 2 }}>
                        {tabs.map(t => (
                            <button key={t.id} className={`tab ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                                {t.icon} {t.label}
                                {t.id === "livecam" && <span style={{
                                    marginLeft: 4, fontFamily: "var(--font-ui)", fontSize: 7, letterSpacing: 1,
                                    background: "var(--red)", color: "#fff", padding: "1px 4px", borderRadius: 2,
                                    animation: "pulse 1.5s infinite", verticalAlign: "middle"
                                }}>AI</span>}
                                {t.id === "map" && <span style={{
                                    marginLeft: 4, fontFamily: "var(--font-ui)", fontSize: 7, letterSpacing: 1,
                                    background: "var(--green)", color: "#000", padding: "1px 4px", borderRadius: 2, verticalAlign: "middle"
                                }}>LIVE</span>}
                            </button>
                        ))}
                        <div style={{ flex: 1 }} />
                        <div style={{ alignSelf: "center", display: "flex", gap: 8, alignItems: "center" }}>
                            <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: wsStatus === "connected" ? "var(--green)" : "var(--yellow)", animation: "blink 1s infinite" }}>
                                ● {wsStatus === "connected" ? "WS LIVE" : "SIM MODE"}
                            </span>
                        </div>
                    </div>

                    <StatCards locations={locations} />
                    <LocationSelector locations={locations} activeLocId={activeLocId} setActiveLocId={setActiveLocId} />

                    <div style={{ flex: 1, padding: "8px 16px", overflow: "auto" }}>

                        {/* ── OVERVIEW ── */}
                        {tab === "overview" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 320px", gridTemplateRows: "auto auto", gap: 10 }}>
                                <div><LiveFeed detections={detections} activeLocId={activeLocId} locations={locations} /></div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    <WasteHeatmap locations={locations} activeLocId={activeLocId} setActiveLocId={setActiveLocId} />
                                    <AlertFeed alerts={alerts} />
                                </div>
                                <div style={{ gridRow: "1/3" }}><LiveCamDetector /></div>
                                <div style={{ gridColumn: "1/3" }}><CleaningDecisions locations={locations} /></div>
                            </div>
                        )}

                        {/* ── LIVE MAP ── */}
                        {tab === "map" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 10 }}>
                                <LiveMapPanel
                                    locations={locations}
                                    reports={dbReports}
                                    litter={litter}
                                    setActiveLocId={setActiveLocId}
                                    wsStatus={wsStatus}
                                    apiOnline={apiOnline}
                                />
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    <AlertFeed alerts={alerts} />
                                    <WasteSourceIntelligence locations={locations} />
                                </div>
                            </div>
                        )}

                        {/* ── LIVE CAM ── */}
                        {tab === "livecam" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 10 }}>
                                <LiveCamDetector />
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    <CrowdMonitor locations={locations} activeLocId={activeLocId} />
                                    <LitterMonitor litter={litter} />
                                </div>
                            </div>
                        )}

                        {/* ── DETECTION ── */}
                        {tab === "detection" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                                <LiveFeed detections={detections} activeLocId={activeLocId} locations={locations} />
                                <LitterMonitor litter={litter} />
                                <WasteSourceIntelligence locations={locations} />
                            </div>
                        )}

                        {/* ── ANALYTICS ── */}
                        {tab === "analytics" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                                <WasteHeatmap locations={locations} activeLocId={activeLocId} setActiveLocId={setActiveLocId} />
                                <WasteForecast forecast={forecast} />
                                <CleanlinessScoreboard locations={locations} />
                            </div>
                        )}

                        {/* ── OPERATIONS ── */}
                        {tab === "operations" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                                <CleaningDecisions locations={locations} />
                                <CrowdMonitor locations={locations} activeLocId={activeLocId} />
                                <InfraRecommendations />
                                <AlertFeed alerts={alerts} />
                            </div>
                        )}

                        {/* ── REPORTS ── */}
                        {tab === "reports" && (
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                                <CitizenReports apiOnline={apiOnline} dbReports={dbReports} submitReport={submitReport} />
                                <LitterMonitor litter={litter} />
                                <CleanlinessScoreboard locations={locations} />
                            </div>
                        )}

                    </div>

                    {/* Footer */}
                    <div style={{
                        borderTop: "1px solid var(--border)", padding: "6px 16px",
                        display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--bg2)"
                    }}>
                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)" }}>
                            VIGIL v4.0 · SQLite · WebSockets · Leaflet Maps · COCO-SSD AI · YOLO Bridge
                        </div>
                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text3)" }}>
                            {locations.length} ZONES · {detections.length} DETECTIONS · TICK #{tick}
                        </div>
                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: wsStatus === "connected" ? "var(--green)" : "var(--yellow)" }}>
                            {wsStatus === "connected" ? "● BACKEND CONNECTED" : "● SIMULATION MODE"}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
